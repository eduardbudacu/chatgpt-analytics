<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alchimia Dorinței — Povești</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">Alchimia <span>Dorinței</span></h1>
      <div class="header-stats">
        <span><span class="stat-value" id="stat-total">—</span> povești</span>
        <span><span class="stat-value" id="stat-months">—</span> luni</span>
        <span><span class="stat-value" id="stat-categories">—</span> categorii</span>
      </div>
    </div>
  </header>

  <!-- Filters -->
  <nav class="filters-bar">
    <span class="filter-label">Tip:</span>
    <div class="filter-group">
      <button class="filter-btn" data-category="story">Poveste</button>
      <button class="filter-btn" data-category="poem">Poem</button>
      <button class="filter-btn" data-category="ritual">Ritual</button>
      <button class="filter-btn" data-category="dialogue">Dialog</button>
      <button class="filter-btn" data-category="confession">Confesiune</button>
      <button class="filter-btn" data-category="letter">Scrisoare</button>
      <button class="filter-btn" data-category="scenario">Scenariu</button>
      <button class="filter-btn" data-category="guide">Ghid</button>
    </div>

    <div class="filter-separator"></div>

    <span class="filter-label">Nivel:</span>
    <div class="filter-group">
      <button class="filter-btn level-1" data-level="1">① Poetic</button>
      <button class="filter-btn level-2" data-level="2">② Afectiv</button>
      <button class="filter-btn level-3" data-level="3">③ Visceral</button>
      <button class="filter-btn level-4" data-level="4">④ Sacru</button>
    </div>

    <div class="filter-separator"></div>

    <div class="view-toggle">
      <button class="view-btn active" data-view="grid" title="Grid">▦</button>
      <button class="view-btn" data-view="timeline" title="Timeline">☰</button>
    </div>

    <input type="search" class="search-box" id="search-box" placeholder="Caută în povești…">
  </nav>

  <!-- Story count -->
  <div class="stories-container">
    <div class="story-count" id="story-count">Se încarcă…</div>

    <!-- Grid view -->
    <div class="stories-grid" id="stories-grid">
      <div class="loading">Se încarcă poveștile…</div>
    </div>

    <!-- Timeline view -->
    <div class="timeline-container" id="timeline-container"></div>
  </div>

  <!-- Modal / Reader -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" id="modal-close" aria-label="Închide">&times;</button>
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-nav">
        <button class="nav-btn" id="nav-prev">← Anterioară</button>
        <button class="nav-btn" id="nav-next">Următoarea →</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
